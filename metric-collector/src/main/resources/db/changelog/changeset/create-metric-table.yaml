databaseChangeLog:
  - changeSet:
      id: create-metric
      author: Major Grom
      changes:
        - createTable:
            tableName: metric
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: trace_id
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: request_uri
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: method
                  type: varchar(50)
                  constraints:
                    nullable: false
              - column:
                  name: response_status
                  type: int
                  constraints:
                    nullable: false
              - column:
                  name: start_time
                  type: timestamp
                  constraints:
                    nullable: false
              - column:
                  name: end_time
                  type: timestamp
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp
                  constraints:
                    nullable: false
                    updatable: false
