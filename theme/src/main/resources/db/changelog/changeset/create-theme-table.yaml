databaseChangeLog:
  - changeSet:
      id: create-theme
      author: Ekaterina Makoveewa
      changes:
        - createTable:
            tableName: theme
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: theme
                  type: integer
                  constraints:
                    nullable: false