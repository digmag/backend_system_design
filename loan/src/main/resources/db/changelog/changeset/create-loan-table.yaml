databaseChangeLog:
  - changeSet:
      id: create-loan
      author: Dmitry Slabukhin
      changes:
        - createTable:
            tableName: loan
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: percent
                  type: double
                  constraints:
                    nullable: false