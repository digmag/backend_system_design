databaseChangeLog:
  - changeSet:
      id: create-token
      author: Dmitry Slabukhin
      changes:
        - createTable:
            tableName: tokens
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: token
                  type: text
                  constraints:
                    nullable: false
              - column:
                  name: user_id
                  type: uuid
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: tokens
            baseColumnNames: [ user_id ]
            referencedTableName: users
            referencedColumnNames: [ id ]
            constraintName: FK_users_token