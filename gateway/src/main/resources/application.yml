server:
  port: 8080


resilience4j:
  circuitbreaker:
    instances:
      defaultCircuitBreaker:
        failure-rate-threshold: 70
        minimum-number-of-calls: 10
        sliding-window-type: COUNT_BASED
        sliding-window-size: 20
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    reactor.netty: DEBUG

spring:
  application:
    name: gateway
  cloud:
    gateway:
      default-filters:
        - name: Retry
          args:
            retries: 5
            statuses: INTERNAL_SERVER_ERROR
            methods: GET,POST,PATCH
        - name: CircuitBreaker
          args:
            name: defaultCircuitBreaker
      routes:
        - id: employee-application
          uri: ${GATEWAY_EMPLOYEE_URI:http://localhost:8082/}
          predicates:
            - Path=/api/employee/**
        - id: core-application
          uri: ${GATEWAY_CORE_URI:http://localhost:8083/}
          predicates:
            - Path=/api/core/**,/integration/bill/**
        - id: loan-application
          uri: ${GETEWAY_LOAN_URI:http://localhost:8084/}
          predicates:
            - Path=/api/loan/**,/integration/loan/**
        - id: sso-app
          uri: ${GATEWAY_SSO_URI:http://localhost:8086}
          predicates:
            - Path=/api/sso/**,/integration/sso/**
        - id: theme-applocation
          uri: ${GATEWAY_THEME_URI:http://localhost:8085/}
          predicates:
            - Path=/api/theme/**
        - id: websocket_route
          uri: ws://localhost:8083
          filters: []
          predicates:
            - Path=/api/ws/**
        - id: user-service
          uri: http://localhost:8081/
          predicates:
            - Path=/integration/information/**,/integration/account/**
        - id: notification-app
          uri: http://localhost:8087/
          predicates:
            - Path=/api/notification/**,/integration/notification/**